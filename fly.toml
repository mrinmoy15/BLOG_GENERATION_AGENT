# fly.toml app configuration file generated for blog-generation-agent on 2026-03-26T22:45:35-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'blog-generation-agent'
primary_region = 'iad'

[build]

[env]
  PORT = '8000'

[[mounts]]
  source = 'blog_outputs'
  destination = '/app/outputs'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
