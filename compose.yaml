services:
  blog-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/${APP_NAME}:${APP_VERSION}
    container_name: ${CONTAINER_NAME}
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./outputs:/app/outputs
    stdin_open: true
    tty: true